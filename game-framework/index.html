<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230b0d12'/%3E%3Ccircle cx='16' cy='16' r='8' fill='%23ffc857'/%3E%3C/svg%3E">
  <title>Game Framework</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #0b0d12; }
    main { display: flex; justify-content: center; align-items: center; height: 100vh; }
  </style>

  <!--
    Libraries used by this framework:
      p5.js          core drawing & input
      p5.sound       audio (loadSound, soundFile.play, etc.) — used by playSfx/playMusic
      planck.js      physics engine used by p5.play
      p5.play 3      sprites, collisions, animations, camera
      framework.js   the shared shell (title, pause, scoring, save/load)

    Inside this folder we load framework.js as a sibling. Other games in
    this repo load it from a CDN URL — see ../first-game/index.html.
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.2/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.2/addons/p5.sound.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5play@3/planck.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5play@3/p5play.js"></script>
  <script src="framework.js"></script>
  <script src="sketch.js"></script>
</head>
<body>
  <main></main>
</body>
</html>
